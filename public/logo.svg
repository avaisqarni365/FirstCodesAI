<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" fill="none">
  <!-- Logo icon: Code brackets forming a brain/AI circuit -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8956A"/>
      <stop offset="100%" stop-color="#C25D35"/>
    </linearGradient>
    <linearGradient id="g2" x1="12" y1="8" x2="28" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="5" width="40" height="40" rx="12" fill="url(#g1)"/>

  <!-- Left code bracket < -->
  <path d="M16 16L10 25L16 34" stroke="url(#g2)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right code bracket > -->
  <path d="M28 16L34 25L28 34" stroke="url(#g2)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- AI brain neural dots -->
  <circle cx="22" cy="19" r="2" fill="white"/>
  <circle cx="22" cy="25" r="2.5" fill="white"/>
  <circle cx="22" cy="31" r="2" fill="white"/>

  <!-- Neural connections -->
  <line x1="22" y1="21" x2="22" y2="22.5" stroke="white" stroke-width="1.2" opacity="0.8"/>
  <line x1="22" y1="27.5" x2="22" y2="29" stroke="white" stroke-width="1.2" opacity="0.8"/>

  <!-- Side neural branches -->
  <line x1="20" y1="19" x2="17" y2="21" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="19" x2="27" y2="21" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="31" x2="17" y2="29" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="31" x2="27" y2="29" stroke="white" stroke-width="0.8" opacity="0.5"/>

  <!-- Small neural nodes at branch ends -->
  <circle cx="17" cy="21" r="1" fill="white" opacity="0.5"/>
  <circle cx="27" cy="21" r="1" fill="white" opacity="0.5"/>
  <circle cx="17" cy="29" r="1" fill="white" opacity="0.5"/>
  <circle cx="27" cy="29" r="1" fill="white" opacity="0.5"/>

  <!-- Text: CODES -->
  <text x="50" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#2D2520" letter-spacing="-0.5">CODES</text>

  <!-- Text: AI with gradient feel -->
  <text x="134" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#D4764E" letter-spacing="-0.5">AI</text>

  <!-- Subtle tagline dot -->
  <circle cx="156" cy="30" r="2" fill="#E8956A" opacity="0.6"/>
</svg>
